services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://wppconnect:${DB_PASSWORD:-secret}@db:5432/wppconnect
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wppconnect

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wppconnect
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: wppconnect
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    # Porta 5432 não exposta para o host — acesso apenas interno via rede wppconnect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wppconnect -d wppconnect"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - wppconnect

volumes:
  pg_data:

networks:
  wppconnect:
    driver: bridge
