services:
  frontend:
    container_name: wppconnect-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - wppconnect

  api:
    container_name: wppconnect-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://wppconnect:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/wppconnect
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      WPP_MANAGER_URL: ${WPP_MANAGER_URL:-}
      WPP_MANAGER_TOKEN: ${WPP_MANAGER_TOKEN:-}
      WPP_ORIGIN: ${WPP_ORIGIN:-wppconnect-cloud}
      WPP_DEFAULT_RUNTIME: ${WPP_DEFAULT_RUNTIME:-wppconnect-server}
      WPP_DEFAULT_PROVIDER: ${WPP_DEFAULT_PROVIDER:-wppconnect}
      WPP_SERVER: ${WPP_SERVER:-http://host.docker.internal:21465/api}
      WPP_SECRET_KEY: ${WPP_SECRET_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - wppconnect

  db:
    container_name: wppconnect-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wppconnect
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: wppconnect
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wppconnect -d wppconnect"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - wppconnect

volumes:
  pg_data:

networks:
  wppconnect:
    driver: bridge
