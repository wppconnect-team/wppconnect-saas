server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection          "0"                               always;
    add_header X-DNS-Prefetch-Control    "off"                             always;

    # HSTS — descomentar após configurar HTTPS/Cloudflare
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Content Security Policy (linha única — requisito do Nginx) ───────────
    # frame-src e script-src incluem challenges.cloudflare.com para Turnstile
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://challenges.cloudflare.com http://192.168.144.1:21465 ws://192.168.144.1:21465; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;

    # ── Proxy API → backend ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://api:3000;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com cache longo (Vite injeta hash no nome do arquivo)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Bloqueia arquivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}
